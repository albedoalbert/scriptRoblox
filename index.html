<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albedo Script</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ff9c;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* MATRIX BACKGROUND */

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9c;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
font-size:16px;
}

/* CONTAINER */

.container{
width:90%;
max-width:400px;
background:rgba(0,0,0,0.85);
border:1px solid #00ff9c;
padding:20px;
border-radius:12px;
text-align:center;
}

/* TITLE */

.title{
font-size:22px;
margin-bottom:5px;
}

.subtitle{
color:#00cc7a;
margin-bottom:20px;
font-size:14px;
}

/* BUTTON */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:25px;
background:#00ff9c;
color:black;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

/* PROGRESS */

.bar{
width:100%;
height:7px;
background:#111;
border-radius:10px;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
background:#00ff9c;
border-radius:10px;
transition:0.3s;
}

/* CONTINUE */

.continue-box{
position:relative;
margin-top:20px;
}

.lock{
width:100%;
padding:14px;
border:none;
border-radius:25px;
background:#00ff9c;
color:black;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

.blur-lock{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
font-size:16px;
}

.unlock{
display:none;
}

/* RESPONSIVE */

@media(min-width:700px){

.container{
max-width:500px;
padding:30px;
}

.title{
font-size:28px;
}

.btn,.lock{
font-size:16px;
padding:16px;
}

}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div>

> Initializing system...<br>
> Connecting server...<br>
> Decrypting scripts...<br>
> ACCESS GRANTED

</div>

</div>

<!-- MATRIX -->

<canvas id="matrix"></canvas>

<div class="container">

<div class="title">Albedo Script</div>
<div class="subtitle">Support Creator</div>

<button class="btn"
onclick="doTask('https://saweria.co/Fandav')">
💰 Donation
</button>

<p>Steps completed</p>

<div class="bar">
<div class="fill" id="bar"></div>
</div>

<div class="continue-box">

<button class="lock" onclick="goScript()">
Continue to Script
</button>

<div class="blur-lock" id="lockLayer">🔒</div>

</div>

</div>

<script>

/* LOADING */

window.onload=function(){

setTimeout(function(){

document.getElementById("loading").style.display="none";

},2000);

};

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const matrix=letters.split("");

const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff9c";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

/* LOCK SYSTEM */

const limitTime=60000;

let progress=localStorage.getItem("progress")||0;
let lastTime=localStorage.getItem("time")||0;

progress=Number(progress);
lastTime=Number(lastTime);

if(Date.now()-lastTime>limitTime){

progress=0;
localStorage.setItem("progress",0);

}

updateUI();

function doTask(link){

window.open(link,"_blank");

progress=1;

localStorage.setItem("progress",progress);
localStorage.setItem("time",Date.now());

updateUI();

}

function updateUI(){

let percent=(progress/1)*100;

document.getElementById("bar").style.width=percent+"%";

if(progress>=1){

document.getElementById("lockLayer").classList.add("unlock");

}

}

function goScript(){

if(progress<1)return;

window.location.href="script.html";

}

</script>

</body>
</html>
